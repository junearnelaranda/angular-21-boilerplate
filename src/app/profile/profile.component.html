<div class="card">
  <div class="card-body">
    <h1 class="h4 mb-3">My profile</h1>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row g-3">
        <div class="col-md-2">
          <label class="form-label" for="title">Title</label>
          <select class="form-select" id="title" formControlName="title">
            <option>Mr</option>
            <option>Ms</option>
            <option>Mrs</option>
            <option>Dr</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label" for="firstName">First name</label>
          <input class="form-control" id="firstName" formControlName="firstName">
        </div>
        <div class="col-md-5">
          <label class="form-label" for="lastName">Last name</label>
          <input class="form-control" id="lastName" formControlName="lastName">
        </div>
        <div class="col-md-6">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" id="email" type="email" formControlName="email">
        </div>
        <div class="col-md-3">
          <label class="form-label" for="password">New password</label>
          <input class="form-control" id="password" type="password" formControlName="password">
        </div>
        <div class="col-md-3">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input class="form-control" id="confirmPassword" type="password" formControlName="confirmPassword">
        </div>
      </div>
      <button class="btn btn-primary mt-4" type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Saving...' : 'Save changes' }}
      </button>
    </form>
  </div>
</div>
