<div class="card auth-panel mx-auto">
  <div class="card-body">
    <h1 class="h4 mb-3">Register</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label" for="title">Title</label>
          <select class="form-select" id="title" formControlName="title">
            <option value="">Choose</option>
            <option>Mr</option>
            <option>Ms</option>
            <option>Mrs</option>
            <option>Dr</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="firstName">First name</label>
          <input class="form-control" id="firstName" formControlName="firstName">
        </div>
        <div class="col-md-4">
          <label class="form-label" for="lastName">Last name</label>
          <input class="form-control" id="lastName" formControlName="lastName">
        </div>
        <div class="col-12">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" id="email" type="email" formControlName="email">
        </div>
        <div class="col-md-6">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" id="password" type="password" formControlName="password">
        </div>
        <div class="col-md-6">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input class="form-control" id="confirmPassword" type="password" formControlName="confirmPassword">
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" id="acceptTerms" type="checkbox" formControlName="acceptTerms">
            <label class="form-check-label" for="acceptTerms">Accept terms</label>
          </div>
        </div>
      </div>
      <div class="mt-4">
        <button class="btn btn-primary me-2" type="submit" [disabled]="submitting">
          {{ submitting ? 'Registering...' : 'Register' }}
        </button>
        <a class="btn btn-link" routerLink="/account/login">Cancel</a>
      </div>
    </form>
  </div>
</div>
